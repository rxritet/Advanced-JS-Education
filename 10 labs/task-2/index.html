<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVVM Form</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
    .mvvm-form { background: #f5f5f5; padding: 20px; border-radius: 8px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input {
      width: 100%; padding: 10px; border: 1px solid #ddd;
      border-radius: 4px; box-sizing: border-box;
    }
    .error { color: red; font-size: 12px; }
    .preview { background: white; padding: 15px; border-radius: 4px; margin: 20px 0; }
    .actions { display: flex; gap: 10px; }
    .actions button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    .actions button:first-child { background: #0066cc; color: white; }
    .actions button:last-child { background: #666; color: white; }
    .actions button:disabled { background: #ccc; cursor: not-allowed; }
    #message { margin-top: 15px; padding: 10px; border-radius: 4px; }
    #message.success { background: #d4edda; color: #155724; }
    #message.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { UserProfileViewModel } from './mvvm/viewmodel/UserProfileViewModel.js';
    import { UserProfileForm } from './mvvm/view/UserProfileForm.js';

    const viewModel = new UserProfileViewModel();
    const form = new UserProfileForm('app', viewModel);
    form.render();
  </script>
</body>
</html>
