<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo MVC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    .todo-app {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
    }
    .todo-form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .todo-form input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .todo-form button {
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .todo-list {
      list-style: none;
      padding: 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: white;
      margin-bottom: 8px;
      border-radius: 4px;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #888;
    }
    .todo-text {
      flex: 1;
      cursor: pointer;
    }
    .todo-delete {
      background: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    .todo-stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
    }
    .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid #0066cc;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { TodoController } from './mvc/controller/TodoController.js';
    const controller = new TodoController('app');
    console.log('Todo application initialized');
  </script>
</body>
</html>
